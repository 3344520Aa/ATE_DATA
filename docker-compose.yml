services:
  db:
    image: ankane/pgvector:latest
    container_name: chip_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chip_data}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-3344520Qq}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-chip_data}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chip_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chip_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:3344520Qq@db:5432/chip_data}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:-chip-ate-analysis-system-secret-key-2026}
      APP_ENV: development
      DEBUG: "true"
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_USER_STORAGE_GB: ${MAX_USER_STORAGE_GB:-10}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  frontend:
    image: node:20-alpine
    container_name: chip_frontend
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5174:5174"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm config set registry https://registry.npmmirror.com &&
             npm install &&
             npm run dev"

volumes:
  uploads_data:
  frontend_node_modules:

networks:
  default:
    name: chip_network
